<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<meta property="og:title" content="香港山脉打卡">
<meta property="og:description" content="真實地圖 × 12座山峰打卡 × 成就徽章，記錄你的香港登山之旅。">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Scripts loaded dynamically at bottom of body -->

<style>
/* ============================================
   DESIGN TOKENS (OKLCH)
   ============================================ */
:root {
  --bg-deep:       #0b1a14;
  --bg-surface:    #11271d;
  --bg-elevated:   #183226;
  --ink-primary:   #edf2ef;
  --ink-secondary: #8aab99;
  --ink-muted:     #547a65;
  --accent-jade:   #2d8a56;
  --accent-jade-dim: rgba(45,138,86,0.12);
  --accent-sky:    #5b9bd5;
  --accent-sky-dim: rgba(91,155,213,0.12);
  --accent-gold:   #c4a43e;
  --accent-gold-dim: rgba(196,164,62,0.12);
  --ocean:         #a8d8ea;
  --land:          #c8e6c9;
  --sand:          #ffe0b2;
  --radius-sm:     10px;
  --radius-card:   18px;
  --radius-btn:    999px;
  --radius-modal:  28px;
  --font-sans:     'Geist', system-ui, -apple-system, sans-serif;
  --font-cn:       'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --font-mono:     'Geist Mono', 'SF Mono', monospace;
  --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-card: 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.2);
  --shadow-modal: 0 1px 0 rgba(255,255,255,0.05), 0 16px 48px rgba(0,0,0,0.4);

  /* ===== LAYOUT ===== */
  --map-height: calc(100dvh - 56px);
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--ink-primary);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ============================================
   TYPOGRAPHY
   ============================================ */
h1, h2, h3 { font-family: var(--font-cn); line-height: 1.2; }
h1 { font-size: 1.75rem; font-weight: 700; }
h2 { font-size: 1.25rem; font-weight: 600; }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ============================================
   AUTH VIEWS
   ============================================ */
.auth-container {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-deep);
}
.auth-container.active { display: flex; }

.auth-card {
  width: 90%; max-width: 400px;
  background: var(--bg-surface);
  border-radius: var(--radius-card);
  padding: 2.5rem 2rem;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.03);
}

.auth-card h1 { text-align: left; margin-bottom: 0.25rem; font-size: 1.625rem; letter-spacing: -0.02em; }
.auth-card .subtitle { text-align: left; color: var(--ink-secondary); font-size: 0.875rem; margin-bottom: 2rem; }

.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 0.75rem; color: var(--ink-muted); margin-bottom: 0.5rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.form-group input {
  width: 100%; padding: 0.8125rem 1rem;
  background: var(--bg-deep);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--ink-primary);
  font-size: 0.9375rem;
  font-family: var(--font-sans);
  transition: border-color 0.25s var(--ease-out-quint), box-shadow 0.25s var(--ease-out-quint);
  outline: none;
}
.form-group input:focus {
  border-color: var(--accent-jade);
  box-shadow: 0 0 0 3px var(--accent-jade-dim);
}
.form-group input::placeholder { color: var(--ink-muted); opacity: 0.6; }

.avatar-pick {
  display: flex; gap: 0.75rem; margin-top: 0.25rem;
}
.avatar-btn {
  flex: 1; padding: 0.875rem 0.5rem;
  background: var(--bg-deep);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--ink-secondary);
  font-size: 0.9375rem;
  cursor: pointer;
  transition: all 0.25s var(--ease-out-quint);
  text-align: center;
}
.avatar-btn:hover { border-color: rgba(255,255,255,0.1); color: var(--ink-primary); }
.avatar-btn.selected { border-color: var(--accent-jade); background: var(--accent-jade-dim); color: var(--ink-primary); }

.btn {
  width: 100%; padding: 0.8125rem;
  border: none; border-radius: var(--radius-btn);
  font-size: 0.9375rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.25s var(--ease-out-quint);
  font-family: var(--font-sans);
  position: relative; overflow: hidden;
}
.btn-primary { background: var(--accent-jade); color: #fff; }
.btn-primary:hover { background: #247148; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(45,138,86,0.3); }
.btn-primary:active { transform: scale(0.98) translateY(0); }

.auth-error {
  color: #e57373; font-size: 0.8125rem; text-align: left;
  margin-top: 0.75rem; min-height: 1.25rem;
}

.auth-switch {
  text-align: center; margin-top: 1.25rem; font-size: 0.8125rem; color: var(--ink-muted);
}
.auth-switch a { color: var(--accent-jade); cursor: pointer; text-decoration: none; font-weight: 500; }
.auth-switch a:hover { text-decoration: underline; }

/* ============================================
   TOP NAVIGATION
   ============================================ */
.top-nav {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0.875rem 1.25rem;
  background: linear-gradient(180deg, rgba(11,26,20,0.95) 60%, rgba(11,26,20,0) 100%);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  justify-content: space-between; align-items: center;
}
.top-nav.active { display: flex; }

.nav-user {
  display: flex; align-items: center; gap: 0.625rem;
  font-size: 0.8125rem; color: var(--ink-secondary); font-weight: 500;
}
.nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 0.9375rem; }
.nav-btn {
  padding: 0.4375rem 0.875rem;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-btn);
  color: var(--ink-muted); font-size: 0.75rem; font-weight: 500; cursor: pointer;
  transition: all 0.25s var(--ease-out-quint);
}
.nav-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--ink-primary); background: rgba(255,255,255,0.06); }
.nav-btn:active { transform: scale(0.96); }

/* ============================================
   MAIN APP
   ============================================ */
.app-main {
  display: none; flex-direction: column; min-height: 100dvh;
}
.app-main.active { display: flex; }

/* ============================================
   MAP SECTION (Leaflet)
   ============================================ */
.map-section {
  position: relative;
  width: 100%;
  height: calc(100dvh - 56px);
  z-index: 1;
}
#map {
  width: 100%;
  height: 100%;
}

/* Leaflet overrides to match dark theme */
.leaflet-container {
  background: #d4dadc;
  font-family: var(--font-sans);
}
.leaflet-control-zoom a {
  background: var(--bg-surface) !important;
  color: var(--ink-primary) !important;
  border-color: rgba(255,255,255,0.08) !important;
}
.leaflet-control-attribution {
  background: rgba(0,0,0,0.5) !important;
  color: var(--ink-muted) !important;
  font-size: 0.625rem !important;
}
.leaflet-control-attribution a { color: var(--ink-secondary) !important; }

/* Custom mountain marker */
.mountain-marker {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 2px solid var(--ink-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.mountain-marker:hover { transform: scale(1.2); }
.mountain-marker.checked {
  background: var(--accent-jade);
  border-color: var(--accent-jade);
  box-shadow: 0 0 12px rgba(45,138,86,0.4);
}

/* Mountain tooltip */
.leaflet-tooltip.mountain-tooltip {
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--ink-primary);
  font-family: var(--font-cn);
  font-size: 0.75rem;
  padding: 0.375rem 0.625rem;
  box-shadow: var(--shadow-card);
  white-space: nowrap;
}
.leaflet-tooltip.mountain-tooltip::before {
  border-top-color: var(--bg-surface);
}

/* Temperature badge */
.weather-temp {
  position: absolute; top: 12px; right: 12px; z-index: 1000;
  background: rgba(11,26,20,0.8); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--ink-primary); font-size: 0.8125rem; font-weight: 600;
  padding: 0.375rem 0.75rem; border-radius: var(--radius-btn);
  border: 1px solid rgba(255,255,255,0.08);
  pointer-events: none;
}

/* ============================================
   STATS PANEL
   ============================================ */
.stats-panel {
  display: flex; gap: 0;
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
  background: rgba(11,26,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
}

.stat-item {
  flex: 1; text-align: center; padding: 1.25rem 0.5rem;
  position: relative;
}
.stat-item + .stat-item::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 1px; background: rgba(255,255,255,0.05);
}
.stat-value { font-family: var(--font-mono); font-size: 1.25rem; font-weight: 700; color: var(--accent-jade); letter-spacing: -0.02em; }
.stat-label { font-size: 0.6875rem; color: var(--ink-muted); margin-top: 0.25rem; letter-spacing: 0.04em; text-transform: uppercase; }

/* ============================================
   MOUNTAIN DETAIL MODAL
   ============================================ */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }

.modal-card {
  width: 90%; max-width: 380px; max-height: 85dvh; overflow-y: auto;
  background: var(--bg-elevated);
  border-radius: var(--radius-modal);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: var(--shadow-modal), inset 0 1px 0 rgba(255,255,255,0.03);
  padding: 1.75rem;
  animation: modalIn 0.35s var(--ease-out-expo);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(24px) scale(0.94); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute; top: 0.875rem; right: 0.875rem;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  color: var(--ink-secondary); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease-out-quint);
}
.modal-close:hover { background: rgba(255,255,255,0.08); color: var(--ink-primary); }
.modal-close:active { transform: scale(0.94); }

.modal-mountain-icon { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
.modal-mountain-name { font-family: var(--font-cn); font-size: 1.375rem; font-weight: 700; text-align: center; }
.modal-mountain-name-en { font-family: var(--font-sans); font-size: 0.875rem; color: var(--ink-secondary); text-align: center; margin-bottom: 1rem; }

.modal-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
.modal-stat { text-align: center; padding: 0.5rem; background: var(--bg-surface); border-radius: 10px; }
.modal-stat-value { font-family: var(--font-mono); font-size: 0.9375rem; font-weight: 600; }
.modal-stat-label { font-size: 0.6875rem; color: var(--ink-muted); }

.modal-desc { font-size: 0.875rem; color: var(--ink-secondary); line-height: 1.6; margin-bottom: 1.25rem; text-align: center; }

.modal-actions { display: flex; flex-direction: column; gap: 0.5rem; }
.btn-checkin { background: var(--accent-jade); color: #fff; font-size: 0.9375rem; padding: 0.875rem; }
.btn-checkin:hover { background: #247148; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(45,138,86,0.3); }
.btn-checkin:active { transform: scale(0.98) translateY(0); }
.btn-checkin.checked { background: var(--accent-jade-dim); color: var(--accent-jade); border: 1px solid rgba(45,138,86,0.2); }
.btn-cert { background: transparent; color: var(--accent-sky); border: 1px solid rgba(91,155,213,0.15); }
.btn-cert:hover { border-color: var(--accent-sky); background: var(--accent-sky-dim); }

/* ============================================
   CERTIFICATE MODAL
   ============================================ */
.cert-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center; justify-content: center; flex-direction: column;
}
.cert-overlay.active { display: flex; }

.cert-card {
  width: 300px; height: 400px;
  background: #0a0e0c;
  border-radius: 12px;
  position: relative; overflow: hidden;
  color: var(--ink-primary);
  flex-shrink: 0;
  box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 20px 60px rgba(0,0,0,0.5);
}
.cert-accent { position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: linear-gradient(180deg, var(--accent-jade) 0%, var(--accent-sky) 100%); }
.cert-content { padding: 2rem 1.75rem 1.75rem 2rem; height: 100%; display: flex; flex-direction: column; }
.cert-header { font-family: var(--font-cn); font-size: 0.6875rem; color: var(--ink-muted); letter-spacing: 0.2em; text-transform: uppercase; }
.cert-mountain { font-family: var(--font-cn); font-size: 1.875rem; font-weight: 700; margin-top: 0.5rem; line-height: 1.1; letter-spacing: -0.01em; }
.cert-mountain-en { font-family: var(--font-sans); font-size: 0.8125rem; color: var(--ink-secondary); margin-bottom: 0.75rem; }
.cert-elevation { font-family: var(--font-mono); font-size: 3.25rem; font-weight: 700; color: var(--accent-jade); line-height: 1; letter-spacing: -0.03em; }
.cert-elevation-unit { font-size: 0.9375rem; color: var(--ink-muted); margin-left: 2px; }
.cert-details { margin-top: auto; font-size: 0.6875rem; color: var(--ink-muted); line-height: 1.8; }
.cert-details span { color: var(--ink-secondary); }
.cert-number { font-family: var(--font-mono); font-size: 0.5625rem; color: rgba(255,255,255,0.15); margin-top: 0.5rem; letter-spacing: 0.08em; }
.cert-user { font-size: 0.875rem; color: var(--ink-primary); font-weight: 600; margin-top: 0.25rem; }
.cert-brand { font-size: 0.5625rem; color: rgba(255,255,255,0.2); margin-top: 0.75rem; text-align: right; letter-spacing: 0.12em; }

.cert-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
.cert-actions .btn { width: auto; padding: 0.625rem 1.25rem; font-size: 0.8125rem; }

/* ============================================
   BADGE TOAST
   ============================================ */
.toast-container {
  position: fixed; top: 1rem; right: 1rem; z-index: 400;
  display: flex; flex-direction: column; gap: 0.5rem;
  pointer-events: none;
}
.badge-toast {
  background: var(--bg-elevated); border: 1px solid rgba(196,164,62,0.25);
  border-radius: var(--radius-card);
  padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.875rem;
  box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 12px 40px rgba(0,0,0,0.5);
  animation: toastIn 0.45s var(--ease-out-expo);
  pointer-events: auto;
  position: relative; overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.badge-toast::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(196,164,62,0.08) 50%, transparent 70%);
  animation: shimmer 2.5s ease-in-out infinite;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.badge-icon { font-size: 1.75rem; flex-shrink: 0; }
.badge-info { font-size: 0.8125rem; }
.badge-name { font-weight: 700; color: var(--accent-gold); letter-spacing: -0.01em; }

/* ============================================
   BADGE GRID (in achievements area)
   ============================================ */
.achievements-section { padding: 2rem 1rem 3rem; }
.achievements-section h2 { margin-bottom: 1rem; font-size: 1.125rem; letter-spacing: -0.01em; }
.badge-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.625rem;
}
.badge-item {
  aspect-ratio: 1;
  background: var(--bg-surface); border-radius: var(--radius-card);
  border: 1px solid rgba(255,255,255,0.04);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 0.5rem;
  transition: all 0.35s var(--ease-out-quint);
}
.badge-item.locked { opacity: 0.3; filter: grayscale(1); }
.badge-item.unlocked {
  border-color: rgba(196,164,62,0.3);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 0 20px rgba(196,164,62,0.08);
}
.badge-item.unlocked:hover { transform: translateY(-3px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 8px 24px rgba(196,164,62,0.15); }
.badge-item .badge-emoji { font-size: 1.75rem; }
.badge-item .badge-title { font-size: 0.5625rem; color: var(--ink-secondary); margin-top: 0.25rem; line-height: 1.2; }
.badge-item.unlocked .badge-title { color: var(--accent-gold); }

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 640px) {
  :root { --map-height: 55vh; }
  .stats-panel { margin: 0 0.75rem; border-radius: 0; }
  .badge-grid { grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
  .modal-card { width: 94%; padding: 1.25rem; }
  .cert-card { width: 260px; height: 347px; }
}

@media (min-width: 1024px) {
  :root { --map-height: 75vh; }
  .app-main { max-width: 900px; margin: 0 auto; }
  .stats-panel { max-width: 500px; margin: 0 auto; }
}

/* ============================================
   LOADING / EMPTY / ERROR STATES
   ============================================ */
.loading-spinner {
  width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent-jade); border-radius: 50%;
  animation: spin 0.6s linear infinite; margin: 2rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   REDUCED MOTION
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- ============================================
     AUTH: LOGIN VIEW
     ============================================ -->
<div class="auth-container active" id="auth-login">
  <div class="auth-card">
    <h1>🏔️ 香港山脉打卡</h1>
    <p class="subtitle">登錄你的登山之旅</p>
    <div class="form-group">
      <label>電子郵箱</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="login-password" placeholder="至少 6 位" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btn-login">載入中...</button>
    <p class="auth-error" id="login-error"></p>

  ]},
];

function loadScript(src, timeout = 5000) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => { s.remove(); reject(new Error('load error')); };
    const t = setTimeout(() => { s.remove(); reject(new Error('timeout')); }, timeout);
    s.addEventListener('load', () => clearTimeout(t));
    document.head.appendChild(s);
  });
}

function showLoadingMsg(msg) {
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}

async function loadAllScripts() {
  for (const lib of CDN_SCRIPTS) {
    let loaded = false;
    for (let i = 0; i < lib.urls.length; i++) {
      try {
        showLoadingMsg(`加載 ${lib.name}...`);
        await loadScript(lib.urls[i]);
        loaded = true;
        break;
      } catch (e) {
        // CDN source failed, try next
      }
    }
    if (!loaded) {
      throw new Error(`無法加載 ${lib.name}，請檢查網絡連接`);
    }
  }
}

    if (raw) { const s = JSON.parse(raw); authToken = s.token; currentUserId = s.userId; return true; }
  } catch(e) {}
  return false;
}
function clearSession() {
  localStorage.removeItem(SESSION_KEY);
  authToken = null; currentUserId = null;
}

function onAuthChange(cb) { _onAuthChange = cb; }
function notifyAuthChange(event) {
  if (_onAuthChange) _onAuthChange(event, authToken ? { user: { id: currentUserId } } : null);
}

// Override api to include session persistence
const _signIn = api.signIn.bind(api);
const _signUp = api.signUp.bind(api);

api.signIn = async function(email, password) {

  if (!result.error) { saveSession(); notifyAuthChange('SIGNED_UP'); }
  return result;
};
api.signOut = async function() {

};
api.getUser = async function() {
  if (!authToken) return { data: null };
  const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, { headers: api.headers() });
  if (!r.ok) { clearSession(); notifyAuthChange('SIGNED_OUT'); return { data: null }; }

    authLogin.classList.remove('active');
    authRegister.classList.remove('active');
    authLogin.style.display = 'none';
    authRegister.style.display = 'none';
  } else if (view === 'login') {
    authLogin.classList.add('active');
    authLogin.style.display = 'flex';
    authRegister.classList.remove('active');
    authRegister.style.display = 'none';
  } else if (view === 'register') {
    authRegister.classList.add('active');
    authRegister.style.display = 'flex';
    authLogin.classList.remove('active');
    authLogin.style.display = 'none';
  }
  appMain.classList.toggle('active', view === 'app');
  topNav.classList.toggle('active', view === 'app');
}

// Login
$('#btn-login').addEventListener('click', async () => {
  if (!supabase) { $('#login-error').textContent = '系統初始化中，請稍候...'; return; }
  const email = $('#login-email').value.trim();
  // [hkmountain] 登錄按鈕被點擊');
  const password = $('#login-password').value;
  if (!email || !password) {
    $('#login-error').textContent = '請填寫所有欄位';
    return;
  }
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    $('#login-error').textContent = error.message === 'Invalid login credentials'
      ? '郵箱或密碼錯誤' : error.message;
  }
});

// Register
$('#btn-register').addEventListener('click', async () => {
  if (!supabase) { $('#register-error').textContent = '系統初始化中，請稍候...'; return; }
  // [hkmountain] 註冊按鈕被點擊');
  const username = $('#reg-username').value.trim();
  const email = $('#reg-email').value.trim();
  const password = $('#reg-password').value;
  // [hkmountain] 註冊資料:', { username, email, passwordLength: password.length, avatarGender });
  if (!username || !email || !password) {
    $('#register-error').textContent = '請填寫所有欄位';
    return;
  }
  if (password.length < 6) {
    $('#register-error').textContent = '密碼至少需要 6 位';
    return;
  }
  $('#register-error').textContent = '';
  $('#btn-register').textContent = '註冊中...';
  $('#btn-register').disabled = true;
  // [hkmountain] 調用 supabase.auth.signUp...');
  const { data, error } = await supabase.auth.signUp({ email, password });
  // [hkmountain] signUp 結果:', { data: !!data, error: error?.message });
  if (error) {
    $('#register-error').textContent = error.message.includes('already registered')
      ? '此郵箱已被註冊' : error.message;
    $('#btn-register').textContent = '註 冊';
    $('#btn-register').disabled = false;
    return;
  }
  if (data.user) {
    // [hkmountain] 用戶創建成功，寫入 profiles...');
    const { error: profileError } = await supabase.from('profiles').insert({
      id: data.user.id,
      username,
      avatar_gender: avatarGender
    });
    // [hkmountain] profiles 寫入:', { error: profileError?.message });
  }
  $('#btn-register').textContent = '註 冊';
  $('#btn-register').disabled = false;
});

// Avatar picker
$$('.avatar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.avatar-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    avatarGender = btn.dataset.gender;
  });
});

// View switching
$('#link-to-register').addEventListener('click', () => showView('register'));
$('#link-to-login').addEventListener('click', () => showView('login'));

// Logout
$('#btn-logout').addEventListener('click', async () => {
  await supabase.auth.signOut();
});

// Auth state listener
supabase.auth.onAuthStateChange(async (event, session) => {
  if (session?.user && currentUserId) {
    // [hkmountain] 用戶已登入:', currentUserId);
    await loadProfile();
    await loadCheckins();
    showView('app');
    updateNav();
    renderMap();
    updateStats();
    renderBadges();
    fetchWeather();
  } else {
    // [hkmountain] 用戶已登出');
    currentProfile = null;
    checkins = [];
    showView('login');
  }
});

function updateNav() {
  $('#nav-avatar').textContent = avatarGender === 'girl' ? '👧' : '👦';
  $('#nav-username').textContent = currentProfile?.username || '';
}

// ============================================
// ============================================
// LEAFLET MAP
// ============================================
let map = null;
let mountainMarkers = {};

function renderMap() {
  if (map) { map.remove(); }
  map = L.map('map', {
    center: [22.35, 114.15],
    zoom: 11,
    zoomControl: true,
    attributionControl: false,
  });

  // OpenStreetMap tiles (free, no API key)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

  const checkedIds = checkins.map(c => c.mountain_id);

  MOUNTAINS.forEach(m => {
    const checked = checkedIds.includes(m.id);
    const icon = L.divIcon({
      className: '',
      html: `<div class="mountain-marker ${checked ? 'checked' : ''}" title="${m.nameCn} ${m.elevation}m">🏔️</div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14],
    });
    const marker = L.marker([m.lat, m.lng], { icon }).addTo(map);
    marker.bindTooltip(`${m.nameCn}<br>${m.elevation}m`, {
      direction: 'top',
      offset: [0, -12],
      className: 'mountain-tooltip',
    });
    marker.on('click', () => openMountainModal(m.id));
    mountainMarkers[m.id] = marker;
  });
}

// ============================================
// MOUNTAIN DETAIL MODAL
// ============================================
function openMountainModal(mountainId) {
  const m = MOUNTAINS.find(mt => mt.id === mountainId);
  if (!m) return;
  currentMountain = m;
  const checked = isChecked(m.id);

  $('#modal-icon').textContent = '🏔️';
  $('#modal-name').textContent = m.nameCn;
  $('#modal-name-en').textContent = m.nameEn;
  $('#modal-elevation').textContent = m.elevation;
  $('#modal-difficulty').textContent = '★'.repeat(m.difficulty) + '☆'.repeat(5 - m.difficulty);
  $('#modal-region').textContent = m.region;
  $('#modal-desc').textContent = m.desc;

  const btnCheckin = $('#btn-checkin');
  const btnCert = $('#btn-view-cert');

  if (checked) {
    const date = getCheckinDate(m.id);
    btnCheckin.textContent = `✅ 已打卡 ${formatDate(date)}`;
    btnCheckin.className = 'btn btn-checkin checked';
    btnCheckin.onclick = null;
    btnCert.style.display = 'block';
    btnCert.onclick = () => openCertificate(m);
  } else {
    btnCheckin.textContent = '🏔️ 我要打卡';
    btnCheckin.className = 'btn btn-checkin';
    btnCheckin.onclick = () => handleCheckin(m);
    btnCert.style.display = 'none';
  }

  $('#mountain-modal').classList.add('active');
}

$('#modal-close').addEventListener('click', () => {
  $('#mountain-modal').classList.remove('active');
});
$('#mountain-modal').addEventListener('click', (e) => {
  if (e.target === $('#mountain-modal')) $('#mountain-modal').classList.remove('active');
});

// ============================================
// CHECKIN FLOW
// ============================================
async function handleCheckin(mountain) {
  const btn = $('#btn-checkin');
  btn.textContent = '打卡中...';
  btn.disabled = true;

  const success = await doCheckin(mountain.id);
  if (!success) {
    btn.textContent = '🏔️ 我要打卡';
    btn.disabled = false;
    return;
  }

  // Celebration sequence
  celebrateCheckin(mountain);

  // Update UI
  renderMap();
  updateStats();
  checkAchievements();
  $('#mountain-modal').classList.remove('active');

  // Open certificate after delay
  setTimeout(() => openCertificate(mountain), 2000);
}

function celebrateCheckin(mountain) {
  if (typeof confetti !== 'undefined') {
    const colors = ['#2d8a56', '#5b9bd5', '#c4a43e', '#e8ece9'];
    confetti({ particleCount: 120, spread: 70, origin: { x: 0.5, y: 0.4 }, colors });
    setTimeout(() => {
      confetti({ particleCount: 60, spread: 50, origin: { x: 0.5, y: 0.4 }, colors });
    }, 300);
  }
}

// ============================================
// CERTIFICATE
// ============================================
function openCertificate(mountain) {
  const rank = checkins.filter(c => c.mountain_id === mountain.id).length > 0
    ? checkins.findIndex(c => c.mountain_id === mountain.id) + 1
    : checkins.length;
  const date = getCheckinDate(mountain.id) || new Date();
  const certNum = `HK-M-${date.getFullYear()}-${String(rank).padStart(3, '0')}`;

  $('#cert-mountain').textContent = mountain.nameCn;
  $('#cert-mountain-en').textContent = mountain.nameEn;
  $('#cert-elevation-val').textContent = mountain.elevation;
  $('#cert-date').textContent = formatDate(date);
  $('#cert-rank').textContent = rank;
  $('#cert-user').textContent = currentProfile?.username || '';
  $('#cert-number').textContent = certNum;

  $('#cert-overlay').classList.add('active');
}

$('#btn-close-cert').addEventListener('click', () => {
  $('#cert-overlay').classList.remove('active');
});

$('#btn-save-cert').addEventListener('click', async () => {
  const card = $('#cert-card');
  try {
    const canvas = await html2canvas(card, { scale: 3, backgroundColor: '#0f1110' });
    const link = document.createElement('a');
    link.download = `hkmountain-${currentMountain?.id || 'cert'}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    console.error('html2canvas error:', e);
    alert('保存失敗，請嘗試截圖保存。');
  }
});

$('#btn-share-cert').addEventListener('click', async () => {
  const card = $('#cert-card');
  try {
    const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#0f1110' });
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    if (navigator.share && blob) {
      const file = new File([blob], 'hkmountain-cert.png', { type: 'image/png' });
      await navigator.share({
        title: `我登頂了${currentMountain?.nameCn || '山峰'}！`,
        text: `我在香港山脈打卡網站登頂了${currentMountain?.nameCn || '山峰'} 🏔️`,
        files: [file],
      });
    } else {
      alert('此瀏覽器不支援分享功能，請使用「保存圖片」後手動分享。');
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error('Share error:', e);
    }
  }
});

// ============================================
// STATS
// ============================================
function updateStats() {
  const total = checkins.length;
  const totalElevation = checkins.reduce((sum, c) => {
    const m = MOUNTAINS.find(mt => mt.id === c.mountain_id);
    return sum + (m ? m.elevation : 0);
  }, 0);
  const highest = checkins.reduce((best, c) => {
    const m = MOUNTAINS.find(mt => mt.id === c.mountain_id);
    return (!best || (m && m.elevation > best.elevation)) ? m : best;
  }, null);

  $('#stat-peaks').textContent = `${total}/12`;
  $('#stat-elevation').textContent = `${totalElevation.toLocaleString()}m`;
  $('#stat-highest').textContent = highest ? highest.nameCn : '--';
}

// ============================================
// ACHIEVEMENTS
// ============================================
function renderBadges() {
  const grid = $('#badge-grid');
  const checkedIds = checkins.map(c => c.mountain_id);
  const totalElevation = checkins.reduce((sum, c) => {
    const m = MOUNTAINS.find(mt => mt.id === c.mountain_id);
    return sum + (m ? m.elevation : 0);
  }, 0);

  grid.innerHTML = ACHIEVEMENTS.map(a => {
    const unlocked = a.cond(checkedIds, totalElevation);
    return `<div class="badge-item ${unlocked ? 'unlocked' : 'locked'}">
      <div class="badge-emoji">${a.icon}</div>
      <div class="badge-title">${a.name}</div>
    </div>`;
  }).join('');
}

let lastAchievements = new Set();
function checkAchievements() {
  const checkedIds = checkins.map(c => c.mountain_id);
  const totalElevation = checkins.reduce((sum, c) => {
    const m = MOUNTAINS.find(mt => mt.id === c.mountain_id);
    return sum + (m ? m.elevation : 0);
  }, 0);

  ACHIEVEMENTS.forEach(a => {
    if (a.cond(checkedIds, totalElevation) && !lastAchievements.has(a.id)) {
      lastAchievements.add(a.id);
      showBadgeToast(a);

      // Special: all 12 celebration
      if (a.id === 'all-12' && typeof confetti !== 'undefined') {
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            confetti({ particleCount: 300, spread: 150, origin: { x: 0.5, y: 0.5 }, colors: ['#2d8a56', '#c4a43e', '#5b9bd5', '#e8ece9'] });
          }, i * 400);
        }
      }
    }
  });

  renderBadges();
}

function showBadgeToast(achievement) {
  const container = $('#toast-container');
  const toast = document.createElement('div');
  toast.className = 'badge-toast';
  toast.innerHTML = `
    <div class="badge-icon">${achievement.icon}</div>
    <div class="badge-info">
      <div class="badge-name">🏅 ${achievement.name}</div>
      <div style="color:var(--ink-secondary);font-size:0.75rem;">徽章已解鎖！</div>
    </div>
  `;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ============================================
// WEATHER (temperature only)
// ============================================
async function fetchWeather() {
  try {
    const resp = await fetch('https://api.open-meteo.com/v1/forecast?latitude=22.3&longitude=114.2&current=temperature_2m');
    const data = await resp.json();
    const temp = data.current?.temperature_2m;
    if (temp != null) {
      $('#weather-temp').textContent = `${Math.round(temp)}°C 香港`;
    }
  } catch {
    $('#weather-temp').textContent = '香港';
  }
}

setInterval(fetchWeather, 30 * 60 * 1000);

// ============================================
// UTILITY
// ============================================
function formatDate(date) {
  const d = date instanceof Date ? date : new Date(date);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
}

// ============================================
// INIT
// ============================================
// Check for existing session
supabase.auth.getSession().then(({ data }) => {
  if (!data.session) {
    showView('login');
  }
});

// Close modals on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    $('#mountain-modal').classList.remove('active');
    $('#cert-overlay').classList.remove('active');
  }
});

// Start the app
initApp();
</script>
